name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Delete the lock file before install: npm bug 4828 prevents the
      # optional @rollup/rollup-linux-x64-gnu binary from being installed
      # from a lock file generated on macOS arm64. Fresh resolve picks
      # the right native binary for the runner's platform.
      - run: rm -f package-lock.json apps/dual-n-back/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
