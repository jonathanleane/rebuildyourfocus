name: rebuildyourfocus
region: syd
static_sites:
  - name: web
    source_dir: /
    github:
      repo: jonathanleane/rebuildyourfocus
      branch: main
      deploy_on_push: true
    # DO buildpack auto-runs `npm install` against the macOS-generated
    # lock file BEFORE this command, which trips npm bug 4828 (optional
    # rollup native deps skipped cross-platform). Wipe lock + node_modules
    # and reinstall from scratch so rollup's linux native binary lands.
    build_command: rm -rf package-lock.json node_modules apps/dual-n-back/node_modules && npm install --no-audit --no-fund && npm -w dual-n-back run build
    output_dir: apps/dual-n-back/dist
    environment_slug: node-js
    catchall_document: index.html
    routes:
      - path: /
